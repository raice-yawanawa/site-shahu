# Configuração do painel de conteúdo (Sveltia CMS / compatível com Decap CMS).
# Documentação: https://github.com/sveltia/sveltia-cms

backend:
  name: github
  repo: raice-yawanawa/site-shahu
  branch: main
  # Provedor de OAuth (Cloudflare Worker sveltia-cms-auth) que faz o login via GitHub.
  base_url: https://sveltia-cms-auth.raice-yawanawa.workers.dev

# Idioma do painel
locale: pt

# Onde ficam as imagens enviadas pelo painel (padrão: imagens da marca).
media_folder: "assets/images/brand"
public_folder: "/assets/images/brand"

collections:
  # ------------------------------------------------------------------ Peças
  - name: products
    label: "Peças"
    label_singular: "Peça"
    description: "Produtos do catálogo (joias, vestuário, arte)."
    folder: "content/products"
    create: true
    slug: "{{slug}}"
    format: frontmatter
    # Imagens das peças vão para uma pasta própria.
    media_folder: "/assets/images/products"
    public_folder: "/assets/images/products"
    fields:
      - { label: "Nome", name: "name", widget: "string" }
      - {
          label: "Preço (R$) — deixe vazio para 'sob consulta'",
          name: "price",
          widget: "number",
          required: false,
          value_type: "float",
          step: 0.01,
          min: 0,
        }
      - label: "Categoria"
        name: "category"
        widget: "select"
        options:
          - { label: "Joias", value: "joias" }
          - { label: "Vestuário", value: "vestuario" }
          - { label: "Arte", value: "arte" }
      - label: "Subcategoria"
        name: "subcategory"
        widget: "select"
        hint: "Deve pertencer à categoria escolhida (ver guia de conteúdo)."
        options:
          - { label: "Colares (Joias)", value: "colares" }
          - { label: "Brincos (Joias)", value: "brincos" }
          - { label: "Pulseiras (Joias)", value: "pulseiras" }
          - { label: "Anéis (Joias)", value: "aneis" }
          - { label: "Amarradores (Joias)", value: "amarradores" }
          - { label: "Vestidos (Vestuário)", value: "vestidos" }
          - { label: "Cintos (Vestuário)", value: "cintos" }
          - { label: "Gravuras (Arte)", value: "gravuras" }
          - { label: "Fotografias (Arte)", value: "fotografias" }
      - label: "Fotos"
        name: "images"
        widget: "list"
        required: false
        field: { label: "Foto", name: "image", widget: "image" }
      - {
          label: "Disponível",
          name: "available",
          widget: "boolean",
          default: true,
        }
      - {
          label: "Destaque na home",
          name: "featured",
          widget: "boolean",
          default: false,
        }
      - {
          label: "Sob encomenda",
          name: "made_to_order",
          widget: "boolean",
          default: false,
          hint: "Adiciona automaticamente o aviso de encomenda e destaca a peça no carrinho.",
        }
      - { label: "Descrição", name: "body", widget: "markdown" }

  # ------------------------------------------------------ Configurações do site
  - name: "settings"
    label: "Configurações do site"
    files:
      - name: "sobre"
        label: "Página 'Nossa História'"
        file: "content/sobre.yaml"
        fields:
          - label: "Histórias"
            name: "stories"
            widget: "list"
            label_singular: "História"
            hint: "Seções da página 'Nossa História'. Independente da página inicial."
            fields:
              - { label: "Título (opcional)", name: "title", widget: "string", required: false }
              - label: "Parágrafos"
                name: "paragraphs"
                widget: "list"
                label_singular: "Parágrafo"
                field: { label: "Parágrafo", name: "paragrafo", widget: "text" }
              - label: "Fotos (opcional)"
                name: "photos"
                widget: "list"
                required: false
                label_singular: "Foto"
                fields:
                  - { label: "Imagem", name: "src", widget: "image" }
                  - { label: "Texto alternativo", name: "alt", widget: "string" }
                  - { label: "Legenda (opcional)", name: "caption", widget: "string", required: false }
      - name: "site"
        label: "Site, contato e página inicial"
        file: "content/site.yaml"
        fields:
          - {
              label: "Base URL (deixe vazio para domínio na raiz)",
              name: "base_url",
              widget: "string",
              required: false,
            }
          - label: "Marca"
            name: "brand"
            widget: "object"
            fields:
              - { label: "Nome", name: "name", widget: "string" }
              - { label: "Slogan", name: "tagline", widget: "string" }
              - { label: "Logo", name: "logo", widget: "image" }
          - label: "Contato"
            name: "contact"
            widget: "object"
            fields:
              - {
                  label: "WhatsApp (só dígitos, com DDI. Ex.: 5511999999999)",
                  name: "whatsapp",
                  widget: "string",
                }
              - {
                  label: "Instagram (sem @)",
                  name: "instagram",
                  widget: "string",
                }
          - label: "Página inicial"
            name: "home"
            widget: "object"
            fields:
              - {
                  label: "Título do topo",
                  name: "hero_title",
                  widget: "string",
                }
              - {
                  label: "Subtítulo do topo",
                  name: "hero_subtitle",
                  widget: "string",
                }
              - {
                  label: "Imagem do topo",
                  name: "hero_image",
                  widget: "image",
                  required: false,
                }
              - label: "Histórias"
                name: "stories"
                widget: "list"
                label_singular: "História"
                hint: "Adicione quantas seções desejar. As fotos de cada história aparecem logo abaixo do seu texto."
                fields:
                  - { label: "Título (opcional)", name: "title", widget: "string", required: false }
                  - label: "Parágrafos"
                    name: "paragraphs"
                    widget: "list"
                    label_singular: "Parágrafo"
                    field: { label: "Parágrafo", name: "paragrafo", widget: "text" }
                  - label: "Fotos (opcional)"
                    name: "photos"
                    widget: "list"
                    required: false
                    label_singular: "Foto"
                    hint: "Fotos exibidas logo abaixo desta história."
                    fields:
                      - { label: "Imagem", name: "src", widget: "image" }
                      - { label: "Texto alternativo", name: "alt", widget: "string" }
                      - { label: "Legenda (opcional)", name: "caption", widget: "string", required: false, hint: "Aparece abaixo da foto em texto discreto." }
              - label: "Ordem dos destaques"
                name: "featured_order"
                widget: "list"
                required: false
                label_singular: "Peça"
                hint: "Slugs das peças em destaque, na ordem desejada (ex.: colar-verde). Peças com 'Destaque' ativado mas não listadas aqui aparecem ao final em ordem alfabética."
              - {
                  label: "Título dos destaques",
                  name: "featured_title",
                  widget: "string",
                }
              - {
                  label: "Título do bloco de contato",
                  name: "cta_title",
                  widget: "string",
                }
              - {
                  label: "Texto do bloco de contato",
                  name: "cta_text",
                  widget: "text",
                }
