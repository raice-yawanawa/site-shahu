  story_paragraphs:
    - A SHAHU RAUTIHU KENEYA nasce do desejo de manter viva a arte e a ancestralidade do meu povo. Cada colar, brinco, pulseira e gravura é feito à mão, com técnicas passadas de geração em geração.
    - Trabalho com sementes, fibras e grafismos que contam histórias — de cura, de floresta, de resistência. Ao levar uma peça, você apoia diretamente a arte indígena e ajuda a preservar esse conhecimento.
    - 'Este é um trabalho voluntário de apoio: cada compra fortalece a preservação da cultura Yawanawá.'
