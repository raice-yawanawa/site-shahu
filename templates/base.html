<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ site.brand_name }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ site.tagline }} — artesanato indígena feito à mão.{% endblock %}">

  <link rel="icon" href="{{ url(site.logo) }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url('/static/css/theme.css') }}">

  <script>
    // Configuração exposta ao carrinho (checkout via WhatsApp).
    window.SHAHU = {
      whatsapp: "{{ site.contact.whatsapp_digits }}",
      brand: {{ site.brand_name | tojson }}
    };
  </script>
</head>
<body>
  {% include "partials/header.html" %}

  <div class="layout">
    {% include "partials/sidebar.html" %}
    <main class="content" id="conteudo">
      {% block content %}{% endblock %}
    </main>
  </div>

  {% include "partials/footer.html" %}
  {% include "partials/cart.html" %}

  <div class="overlay" data-overlay hidden></div>

  <script src="{{ url('/static/js/sidebar.js') }}" defer></script>
  <script src="{{ url('/static/js/cart.js') }}" defer></script>
</body>
</html>
