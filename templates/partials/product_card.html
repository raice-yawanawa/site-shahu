<article class="card">
  <a class="card__media" href="{{ url(product.url) }}">
    <img class="card__img" src="{{ url(product.cover) }}" alt="{{ product.name }}"
         loading="lazy" onerror="this.src='{{ url('/static/img/placeholder.svg') }}'">
    {% if not product.available %}
    <span class="badge badge--indisponivel">Indisponível</span>
    {% elif product.made_to_order %}
    <span class="badge badge--encomenda">Sob encomenda</span>
    {% elif product.featured %}
    <span class="badge badge--destaque">Destaque</span>
    {% endif %}
  </a>
  <div class="card__body">
    <h3 class="card__name"><a href="{{ url(product.url) }}">{{ product.name }}</a></h3>
    <p class="card__price">{{ product.price | moeda }}</p>
    {% if product.available %}
    <button class="btn btn--primary card__add" type="button"
            data-add-to-cart
            data-slug="{{ product.slug }}"
            data-name="{{ product.name }}"
            data-price="{{ product.price if product.has_price else '' }}"
            data-url="{{ url(product.url) }}"
            data-image="{{ url(product.cover) }}"
            data-made-to-order="{{ 'true' if product.made_to_order else 'false' }}">
      Adicionar
    </button>
    {% else %}
    <button class="btn btn--disabled" type="button" disabled>Indisponível</button>
    {% endif %}
  </div>
</article>
