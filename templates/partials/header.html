{% from "partials/icons.html" import whatsapp, instagram %}
<header class="header">
  <button class="header__menu" type="button" data-menu-toggle aria-label="Abrir menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>

  <a class="header__brand" href="{{ url('/') }}">
    <img class="header__logo" src="{{ url(site.logo) }}" alt="{{ site.brand_name }}">
    <span class="header__brand-text">
      <strong>
        <span class="header__brand-full">{{ site.brand_name }}</span>
        <span class="header__brand-short">{{ site.brand_name.split()[0] }}</span>
      </strong>
      <em>{{ site.tagline }}</em>
    </span>
  </a>

  <div class="header__actions">
    <a class="header__social header__social--whatsapp" href="{{ site.contact.whatsapp_url }}"
       target="_blank" rel="noopener" aria-label="WhatsApp" title="WhatsApp">{{ whatsapp() }}</a>
    <a class="header__social header__social--instagram" href="{{ site.contact.instagram_url }}"
       target="_blank" rel="noopener" aria-label="Instagram" title="Instagram">{{ instagram() }}</a>

    <button class="header__cart" type="button" data-cart-open aria-label="Abrir carrinho">
      <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
        <path fill="currentColor" d="M7 18a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm10 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4ZM6.2 4l.8 3h11.6a1 1 0 0 1 .96 1.27l-1.8 6.3A2 2 0 0 1 15.84 16H8.4a2 2 0 0 1-1.94-1.5L4.2 5H2V3h3a1 1 0 0 1 .97.76L6.2 4Z"/>
      </svg>
      <span class="header__cart-count" data-cart-count>0</span>
    </button>
  </div>
</header>
